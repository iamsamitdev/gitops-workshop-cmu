# =============================================================
# sealed-secret-example.yaml
# ตัวอย่าง SealedSecret 2 ประเภท:
#   1. App Secret  — DB credentials ของ application
#   2. Repo Creds  — GitHub PAT สำหรับ connect private repo
#
# ⚠️  นี่คือ EXAMPLE เท่านั้น — encryptedData เป็น placeholder
# ในการใช้งานจริง ให้ generate ด้วย kubeseal เสมอ
# ดูวิธีใช้งานเพิ่มเติมที่ README.md
# =============================================================

---
# ─────────────────────────────────────────────────────────────
# ตัวอย่างที่ 1: App Secret — DB & API credentials
# Target namespace: dev
# ─────────────────────────────────────────────────────────────
#
# สร้างจาก:
#   kubectl create secret generic app-secret \
#     --from-literal=DB_HOST=postgres.default.svc \
#     --from-literal=DB_PASSWORD=mysecretpassword \
#     --from-literal=API_KEY=my-super-secret-api-key \
#     --namespace=dev --dry-run=client -o yaml | \
#     kubeseal --format yaml --namespace dev > sealed-secret-example.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secret
  namespace: dev
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "false"
spec:
  encryptedData:
    # *** ค่านี้ใช้ไม่ได้จริง — ต้อง generate ใหม่ด้วย kubeseal ***
    DB_HOST: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...placeholder...
    DB_PASSWORD: AgCIY4OJSWK+PiTySYZZA9rO43cGDEq...placeholder...
    API_KEY: AgDef5OJSWK+PiTySYZZA9rO43cGDEq...placeholder...
  template:
    metadata:
      name: app-secret
      namespace: dev
      labels:
        app: my-app
        managed-by: sealed-secrets
    type: Opaque

---
# ─────────────────────────────────────────────────────────────
# ตัวอย่างที่ 2: GitHub PAT — Argo CD Repo Credentials
# Target namespace: argocd
#
# ใช้สำหรับ: ให้ Argo CD access private GitHub repo ได้
#
# ⚠️  IMPORTANT: Secret นี้ต้องมี label พิเศษ:
#   argocd.argoproj.io/secret-type: repository
#   หรือ repo-creds (สำหรับ credential template)
# ─────────────────────────────────────────────────────────────
#
# สร้างขั้นตอน (ทำบน local machine):
#
# ขั้นตอนที่ 1: เตรียม Secret ต้นฉบับ (ไม่ apply จริง)
#   kubectl create secret generic argocd-repo-my-private-repo \
#     --namespace=argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/username/my-private-repo.git \
#     --from-literal=username=github-username \
#     --from-literal=password=ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx \
#     --dry-run=client -o yaml > /tmp/repo-secret-raw.yaml
#
# ขั้นตอนที่ 2: เพิ่ม label ที่ Argo CD ต้องการ
# (แก้ไขไฟล์เพิ่ม labels.argocd.argoproj.io/secret-type: repository)
#
# ขั้นตอนที่ 3: Encrypt ด้วย kubeseal
#   kubeseal --format yaml --namespace argocd \
#     < /tmp/repo-secret-raw.yaml \
#     > gitops/secrets/sealed-repo-creds.yaml
#
# ขั้นตอนที่ 4: ลบไฟล์ต้นฉบับ
#   rm /tmp/repo-secret-raw.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-repo-my-private-repo
  namespace: argocd
spec:
  encryptedData:
    # *** ค่านี้ใช้ไม่ได้จริง — ต้อง generate ใหม่ด้วย kubeseal ***
    type: AgABC123...placeholder-encrypted-type...
    url: AgDEF456...placeholder-encrypted-url...
    username: AgGHI789...placeholder-encrypted-username...
    password: AgJKL012...placeholder-encrypted-pat-token...
  template:
    metadata:
      name: argocd-repo-my-private-repo
      namespace: argocd
      labels:
        # ⚠️  Label นี้สำคัญมาก — ถ้าหายไป Argo CD จะไม่รู้ว่านี่คือ repo credentials
        argocd.argoproj.io/secret-type: repository
    type: Opaque

---
# ─────────────────────────────────────────────────────────────
# ตัวอย่างที่ 3: GitHub PAT — Credential Template
# ใช้เมื่อ: มีหลาย private repo ใน org เดียวกัน
# ผลลัพธ์: PAT นี้จะถูกใช้กับทุก repo ที่ขึ้นต้นด้วย url
# ─────────────────────────────────────────────────────────────
#
# สร้างขั้นตอน:
#   kubectl create secret generic github-org-creds \
#     --namespace=argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/your-org \
#     --from-literal=username=github-username \
#     --from-literal=password=ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx \
#     --dry-run=client -o yaml > /tmp/org-creds-raw.yaml
#   (เพิ่ม label: argocd.argoproj.io/secret-type: repo-creds)
#   kubeseal --format yaml --namespace argocd \
#     < /tmp/org-creds-raw.yaml \
#     > gitops/secrets/sealed-org-creds.yaml
#   rm /tmp/org-creds-raw.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-org-creds
  namespace: argocd
spec:
  encryptedData:
    # *** ค่านี้ใช้ไม่ได้จริง — ต้อง generate ใหม่ด้วย kubeseal ***
    type: AgABC123...placeholder-encrypted-type...
    url: AgDEF456...placeholder-encrypted-org-url...
    username: AgGHI789...placeholder-encrypted-username...
    password: AgJKL012...placeholder-encrypted-pat-token...
  template:
    metadata:
      name: github-org-creds
      namespace: argocd
      labels:
        # repo-creds = credential template (ใช้กับหลาย repo)
        # repository  = ใช้กับ repo เดียว
        argocd.argoproj.io/secret-type: repo-creds
    type: Opaque
