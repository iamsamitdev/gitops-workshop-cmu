# Kind Cluster Configuration
# Workshop: GitOps with Argo CD — Day 1, Lab 2
# สร้าง local Kubernetes cluster ด้วย kind

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: gitops-workshop

nodes:
  - role: control-plane
    # Port mapping สำหรับ NodePort Services
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Argo CD UI (Day 2)
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
    # Label สำหรับ ingress controller (ถ้าต้องการใช้)
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

# คำสั่งสร้าง cluster:
# kind create cluster --config infra/kind/kind-config.yaml --name gitops-workshop
#
# ตรวจสอบ:
# kubectl cluster-info
# kubectl get nodes
#
# ลบ cluster:
# kind delete cluster --name gitops-workshop
