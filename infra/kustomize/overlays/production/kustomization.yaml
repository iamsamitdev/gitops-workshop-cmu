# Kustomize Overlay — Production Environment
# Section 6 Lab: Kustomize Multi-environment
# ครอบคลุม: replicas=3, namePrefix=prod-, resource limits, immutable tag

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# อ้างอิงจาก base
resources:
  - ../../base

# เพิ่ม prefix ให้ทุก resource ใน production
namePrefix: prod-

# เพิ่ม labels ให้ทุก resource
commonLabels:
  environment: production
  managed-by: kustomize

# เพิ่ม annotations ให้ทุก resource
commonAnnotations:
  workshop.gitops/environment: production
  workshop.gitops/managed-by: argo-cd

# กำหนด namespace
namespace: production

# patches — แก้ไขค่าเฉพาะ production
patches:
  # เพิ่ม replicas เป็น 3
  - target:
      kind: Deployment
      name: my-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  # เพิ่ม resource limits สำหรับ production
  - target:
      kind: Deployment
      name: my-app
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"

# กำหนด image tag สำหรับ production
# ใช้ immutable tag (SemVer) — ห้ามใช้ latest!
# CI pipeline จะ update tag นี้โดยใช้: kustomize edit set image
images:
  - name: ghcr.io/username/my-app
    newTag: v1.0.0
