# Kustomize Overlay — Dev Environment
# Section 6 Lab: Kustomize Multi-environment
# ครอบคลุม: replicas=1, namePrefix=dev-, image tag=dev-latest

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# อ้างอิงจาก base
resources:
  - ../../base

# เพิ่ม prefix ให้ทุก resource ใน dev
namePrefix: dev-

# เพิ่ม labels ให้ทุก resource
commonLabels:
  environment: dev
  managed-by: kustomize

# เพิ่ม annotations ให้ทุก resource
commonAnnotations:
  workshop.gitops/environment: dev
  workshop.gitops/managed-by: argo-cd

# กำหนด namespace
namespace: dev

# patches — แก้ไขค่าเฉพาะ dev
patches:
  - target:
      kind: Deployment
      name: my-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

# กำหนด image tag สำหรับ dev
# CI pipeline จะ update newTag นี้โดยใช้ kustomize edit set image
images:
  - name: ghcr.io/username/my-app
    newTag: dev-latest
