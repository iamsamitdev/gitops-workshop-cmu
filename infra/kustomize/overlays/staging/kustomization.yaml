# Kustomize Overlay — Staging Environment
# Section 6 Lab: Kustomize Multi-environment
# ครอบคลุม: replicas=2, namePrefix=staging-

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# อ้างอิงจาก base
resources:
  - ../../base

# เพิ่ม prefix ให้ทุก resource ใน staging
namePrefix: staging-

# เพิ่ม labels ให้ทุก resource
commonLabels:
  environment: staging
  managed-by: kustomize

# เพิ่ม annotations ให้ทุก resource
commonAnnotations:
  workshop.gitops/environment: staging
  workshop.gitops/managed-by: argo-cd

# กำหนด namespace
namespace: staging

# patches — แก้ไขค่าเฉพาะ staging
patches:
  - target:
      kind: Deployment
      name: my-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

# กำหนด image tag สำหรับ staging
images:
  - name: ghcr.io/username/my-app
    newTag: staging-latest
